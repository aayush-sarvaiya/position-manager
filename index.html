<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Position Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --bg2: #151c27;
    --bg3: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e5e7eb;
    --text2: #9ca3af;
    --text3: #6b7280;
    --text4: #4b5563;
    --green: #22c55e;
    --green-d: #16a34a;
    --green-bg: rgba(34,197,94,0.08);
    --green-b: rgba(34,197,94,0.2);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.08);
    --red-b: rgba(239,68,68,0.2);
    --orange: #f97316;
    --purple: #a78bfa;
    --blue: #60a5fa;
    --yellow: #fbbf24;
    --indigo: #818cf8;
  }

  html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }

  .app { padding: 20px 22px; max-width: 1400px; margin: 0 auto; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .header-left .label { font-size: 10px; letter-spacing: .18em; color: var(--green); text-transform: uppercase; margin-bottom: 3px; font-family: 'DM Mono', monospace; }
  .header-left h1 { font-size: 24px; font-weight: 700; letter-spacing: -.8px; color: #f9fafb; }
  .header-right { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* Buttons */
  .btn { border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Mono', monospace; transition: opacity .15s, transform .1s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: linear-gradient(135deg, var(--green), var(--green-d)); color: #fff; }
  .btn-secondary { background: rgba(255,255,255,0.06); border: 1px solid var(--border2) !important; color: var(--text2); }
  .btn-danger { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25) !important; color: #f87171; }
  .btn-backup { background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.25) !important; color: var(--blue); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }

  /* Metrics */
  .metrics { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .metric { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; flex: 1; min-width: 110px; }
  .metric.glow { background: rgba(34,197,94,0.06); border-color: rgba(34,197,94,0.25); }
  .metric-label { font-size: 9px; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .metric-value { font-size: 19px; font-weight: 700; font-family: 'DM Mono', monospace; letter-spacing: -.5px; line-height: 1; }
  .metric-sub { font-size: 10px; color: var(--text3); margin-top: 4px; font-family: 'DM Mono', monospace; }

  /* Tabs */
  .tabs { display: flex; gap: 3px; margin-bottom: 18px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 4px; width: fit-content; }
  .tab-btn { background: transparent; border: 1px solid transparent; border-radius: 7px; padding: 7px 16px; color: var(--text3); font-size: 13px; font-weight: 400; cursor: pointer; transition: all .15s; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
  .tab-btn.active { background: rgba(255,255,255,0.09); border-color: var(--border2); color: #f9fafb; font-weight: 600; }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 13px; }

  /* Card */
  .card { background: rgba(255,255,255,0.025); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; position: relative; cursor: pointer; transition: all .18s ease; }
  .card:hover { border-color: var(--border2); transform: translateY(-1px); background: rgba(255,255,255,0.04); }
  .card-actions { position: absolute; top: 11px; right: 11px; display: flex; gap: 5px; opacity: 0; transition: opacity .15s; }
  .card:hover .card-actions { opacity: 1; }
  .card-actions .btn-close-trade { background: rgba(34,197,94,0.13); border: 1px solid rgba(34,197,94,0.25); border-radius: 6px; color: var(--green); padding: 3px 8px; font-size: 10px; cursor: pointer; font-family: 'DM Mono', monospace; font-weight: 700; }
  .card-actions .btn-delete { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.2); border-radius: 6px; color: #f87171; width: 24px; height: 24px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .card-symbol { font-weight: 700; font-size: 15px; color: #f9fafb; letter-spacing: -.3px; }
  .card-name { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .card-pnl-pct { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .card-pnl-abs { font-size: 12px; font-family: 'DM Mono', monospace; text-align: right; }
  .badges { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
  .badge { font-size: 10px; border-radius: 4px; padding: 1px 6px; font-family: 'DM Mono', monospace; border: 1px solid; }
  .badge-sector { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.2); color: var(--indigo); }
  .badge-days { background: rgba(107,114,128,0.1); border-color: rgba(107,114,128,0.2); color: var(--text2); }

  /* Sparkline */
  .sparkline { margin-bottom: 12px; }

  /* Price grid */
  .price-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .price-cell { background: rgba(0,0,0,0.22); border-radius: 7px; padding: 7px 8px; }
  .price-cell-label { font-size: 9px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 2px; font-family: 'DM Mono', monospace; }
  .price-cell-value { font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; }

  .sl-tgt-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .sl-cell  { background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.1); border-radius: 7px; padding: 7px 8px; }
  .tgt-cell { background: rgba(34,197,94,0.07); border: 1px solid rgba(34,197,94,0.1);  border-radius: 7px; padding: 7px 8px; }
  .rr-cell  { background: rgba(251,191,36,0.07); border: 1px solid rgba(251,191,36,0.1); border-radius: 7px; padding: 7px 8px; }
  .mini-label { font-size: 9px; color: var(--text2); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 2px; font-family: 'DM Mono', monospace; }

  .card-footer { display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }
  .card-footer span { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .card-footer span b { color: var(--text2); font-weight: 500; }

  /* Empty state */
  .empty { text-align: center; padding: 80px 0; }
  .empty-icon { font-size: 38px; margin-bottom: 10px; }
  .empty-text { font-size: 14px; color: var(--text3); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: var(--bg2); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .modal-title { font-weight: 700; font-size: 15px; color: var(--text); }
  .modal-close { background: none; border: none; color: var(--text3); font-size: 22px; cursor: pointer; line-height: 1; padding: 2px 6px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 14px; }
  .form-group { margin-bottom: 13px; }
  .form-group.full { grid-column: 1/-1; }
  .form-label { display: block; font-size: 10px; color: var(--text2); margin-bottom: 5px; letter-spacing: .08em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
  .form-input, .form-select, .form-textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 14px; outline: none; font-family: 'DM Mono', monospace; transition: border-color .15s, box-shadow .15s; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: rgba(34,197,94,0.5); box-shadow: 0 0 0 2px rgba(34,197,94,0.08); }
  .form-select { appearance: none; }
  .form-textarea { resize: vertical; min-height: 70px; line-height: 1.55; }
  .form-hint { font-size: 11px; color: var(--text4); margin-bottom: 13px; font-family: 'DM Mono', monospace; }
  .modal-footer { display: flex; gap: 10px; margin-top: 4px; }
  .modal-footer .btn { flex: 1; padding: 10px; font-size: 13px; }

  /* PnL Preview */
  .pnl-preview { border-radius: 9px; padding: 11px 14px; margin-bottom: 13px; display: flex; justify-content: space-between; }
  .pnl-preview-label { font-size: 9px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; margin-bottom: 3px; }
  .pnl-preview-value { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }

  /* Summary box inside close modal */
  .trade-summary { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .ts-label { font-size: 9px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; margin-bottom: 3px; }
  .ts-value { font-size: 13px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }

  /* Journal */
  .journal-stats { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .j-table { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; overflow-x: auto; }
  .j-table-head { display: grid; grid-template-columns: 75px minmax(0,1fr) 80px 80px 50px 50px 90px 75px 85px; padding: 9px 14px; border-bottom: 1px solid var(--border); min-width: 680px; }
  .j-table-head span { font-size: 9px; color: var(--text4); letter-spacing: .12em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
  .j-row { display: grid; grid-template-columns: 75px minmax(0,1fr) 80px 80px 50px 50px 90px 75px 85px; padding: 10px 14px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: background .15s; min-width: 680px; }
  .j-row:last-child { border-bottom: none; }
  .j-row:hover { background: rgba(255,255,255,0.035); }
  .j-row span { font-size: 12px; font-family: 'DM Mono', monospace; }
  .j-symbol { font-weight: 700; font-size: 13px !important; color: #f9fafb; }
  .j-name { font-size: 11px !important; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .reason-badge { font-size: 9px; border-radius: 4px; padding: 2px 6px; font-family: 'DM Mono', monospace; border: 1px solid; white-space: nowrap; }

  /* Journal detail */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .detail-cell { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 8px 11px; }
  .detail-label { font-size: 9px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; margin-bottom: 3px; letter-spacing: .08em; }
  .detail-value { font-size: 13px; color: var(--text); font-family: 'DM Mono', monospace; font-weight: 600; }
  .pnl-box { border-radius: 10px; padding: 13px 15px; margin-bottom: 13px; display: flex; justify-content: space-between; }

  /* Responsive */
  @media (max-width: 600px) {
    .app { padding: 14px 14px; }
    .header-left h1 { font-size: 20px; }
    .metric-value { font-size: 16px; }
    .trade-summary { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .form-group { grid-column: 1; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="label">NSE Portfolio</div>
      <h1>Position Manager</h1>
    </div>
    <div class="header-right">
      <button class="btn btn-backup" onclick="backupData()">⬇ Backup</button>
      <button class="btn btn-backup" onclick="document.getElementById('restoreInput').click()">⬆ Restore</button>
      <input type="file" id="restoreInput" accept=".json" style="display:none" onchange="restoreData(event)">
      <button class="btn btn-secondary" onclick="openCapitalModal()">⚙ Capital</button>
      <button class="btn btn-primary" onclick="openAddModal()">＋ Position</button>
    </div>
  </div>

  <!-- Metrics -->
  <div class="metrics" id="metricsBar"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-positions" onclick="switchTab('positions')">📈 Active (<span id="tab-pos-count">0</span>)</button>
    <button class="tab-btn" id="tab-journal" onclick="switchTab('journal')">📒 Journal (<span id="tab-jnl-count">0</span>)</button>
  </div>

  <!-- Content -->
  <div id="content-positions"></div>
  <div id="content-journal" style="display:none"></div>
</div>

<!-- ══ MODALS ══ -->

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-add" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-add-title">Add Position</div>
      <button class="modal-close" onclick="closeModal('modal-add')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Symbol (NSE)</label><input class="form-input" id="f-symbol" placeholder="e.g. SCI"></div>
      <div class="form-group"><label class="form-label">Company Name</label><input class="form-input" id="f-name" placeholder="e.g. Shipping Corp"></div>
      <div class="form-group"><label class="form-label">Entry Price (₹)</label><input class="form-input" id="f-entry" type="number" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Current Price / CMP (₹)</label><input class="form-input" id="f-cmp" type="number" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Quantity</label><input class="form-input" id="f-qty" type="number" placeholder="0"></div>
      <div class="form-group"><label class="form-label">Entry Date</label><input class="form-input" id="f-date" type="date"></div>
      <div class="form-group"><label class="form-label">Stop Loss (₹)</label><input class="form-input" id="f-sl" type="number" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Target (₹)</label><input class="form-input" id="f-tgt" type="number" placeholder="0.00"></div>
      <div class="form-group full"><label class="form-label">Sector</label>
        <select class="form-select" id="f-sector">
          <option>Energy</option><option>IT</option><option>Banking</option><option>FMCG</option>
          <option>Pharma</option><option>Auto</option><option>Metals</option><option>Realty</option><option>Other</option>
        </select>
      </div>
    </div>
    <p class="form-hint">💡 Click any card later to update CMP or other details.</p>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-add')">Cancel</button>
      <button class="btn btn-primary" id="btn-save-pos" onclick="savePosition()">Add Position</button>
    </div>
  </div>
</div>

<!-- Close Trade Modal -->
<div class="modal-overlay" id="modal-close" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-close-title">Close Trade</div>
      <button class="modal-close" onclick="closeModal('modal-close')">×</button>
    </div>
    <div class="trade-summary" id="close-summary"></div>
    <div class="form-group"><label class="form-label">Exit Price (₹)</label><input class="form-input" id="c-exit" type="number" placeholder="0.00" oninput="updatePnlPreview()"></div>
    <div id="pnl-preview-box" style="display:none" class="pnl-preview">
      <div><div class="pnl-preview-label">Realised P&L</div><div class="pnl-preview-value" id="pnl-preview-val"></div></div>
      <div style="text-align:right"><div class="pnl-preview-label">Return</div><div class="pnl-preview-value" id="pnl-preview-pct"></div></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Exit Date</label><input class="form-input" id="c-date" type="date"></div>
      <div class="form-group"><label class="form-label">Exit Reason</label>
        <select class="form-select" id="c-reason">
          <option>Target Hit</option><option>Stop Loss Hit</option><option>Manual Exit</option>
          <option>Trailing Stop</option><option>News Event</option><option>Other</option>
        </select>
      </div>
      <div class="form-group full"><label class="form-label">Notes / Learnings</label><textarea class="form-textarea" id="c-notes" placeholder="What did you learn? Why did you exit?"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-close')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmClose()">Log &amp; Close Trade</button>
    </div>
  </div>
</div>

<!-- Journal Detail Modal -->
<div class="modal-overlay" id="modal-detail" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="detail-title">Trade Detail</div>
      <button class="modal-close" onclick="closeModal('modal-detail')">×</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- Capital Modal -->
<div class="modal-overlay" id="modal-capital" style="display:none">
  <div class="modal" style="max-width:320px">
    <div class="modal-header">
      <div class="modal-title">Set Total Capital</div>
      <button class="modal-close" onclick="closeModal('modal-capital')">×</button>
    </div>
    <div class="form-group"><label class="form-label">Total Capital (₹)</label><input class="form-input" id="cap-input" type="number" placeholder="500000"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-capital')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCapital()">Save</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const STORAGE_KEY = 'pm-html-v1';
let state = {
  capital: 500000,
  positions: [
    { id:1, symbol:'RELIANCE', name:'Reliance Industries', entry:1280, cmp:1295, qty:10, stopLoss:1230, target:1380, sector:'Energy', entryDate:'2025-03-10' },
    { id:2, symbol:'TCS',      name:'Tata Consultancy',    entry:3200, cmp:3150, qty:8,  stopLoss:3050, target:3500, sector:'IT',     entryDate:'2025-03-18' },
    { id:3, symbol:'INFY',     name:'Infosys',             entry:1380, cmp:1410, qty:15, stopLoss:1320, target:1500, sector:'IT',     entryDate:'2025-04-01' },
  ],
  journal: []
};
let editingId = null;
let closingId = null;
let currentTab = 'positions';

// ══════════════════════════════════════════
//  PERSIST
// ══════════════════════
